services:
  - type: web
    name: optimum
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/data/optimum.db
    disk:
      name: optimum-data
      mountPath: /opt/render/project/data
      sizeGB: 1
